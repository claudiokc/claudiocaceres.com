# Build frontend and deploy to Cloudflare Pages.
# Requires repository secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
# Optional: set CLOUDFLARE_PROJECT_NAME (default: claudiocaceres-com)
name: Deploy to Cloudflare Pages
on:
  push:
    branches:
      - master
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: fe/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        working-directory: fe

      - name: Build
        run: yarn build
        working-directory: fe

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build --project-name=claudiocaceres-com
          workingDirectory: .
